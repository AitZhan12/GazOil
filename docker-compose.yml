services:
  backend:
    build:
      context: ./azs-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/azs
      SPRING_DATASOURCE_USERNAME: azs
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gazoil-network

  frontend:
    build:
      context: ./front
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      - backend
    networks:
      - gazoil-network

networks:
  gazoil-network:
    driver: bridge
